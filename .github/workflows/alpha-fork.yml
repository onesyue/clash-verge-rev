name: Alpha Build

on:
  push:
    branches:
      - dev

permissions: write-all

concurrency:
  group: alpha-build
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  HUSKY: 0

jobs:
  prepare:
    name: Bump version & create release
    runs-on: ubuntu-latest
    # Skip if the push was from the auto-bump commit
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          # Read current version from package.json
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          # Bump patch (third digit)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # Update package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Update src-tauri/tauri.conf.json
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$NEW_VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

          # Update src-tauri/Cargo.toml
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml

          # Commit and tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump dev version to v$NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push origin dev --tags

      - name: Reset Prerelease-alpha tag and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          git tag -f Prerelease-alpha
          git push origin Prerelease-alpha --force
          gh release delete Prerelease-alpha --yes || true
          gh release create Prerelease-alpha \
            --prerelease \
            --title "Prerelease-alpha v$VERSION" \
            --notes "Dev build v$VERSION — may be unstable. Use for testing only."

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            bundle: nsis
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            bundle: dmg
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: dev

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@1.91.0

      - name: Add Rust Target
        run: |
          rustup target add ${{ matrix.target }} --toolchain 1.91.0 || rustup target add ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          key: "rust-alpha-${{ matrix.os }}-${{ matrix.target }}"
          workspaces: . -> target
          cache-all-crates: true

      - name: Install dependencies (ubuntu only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxslt1.1 libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Install x86_64 OpenSSL (macOS Intel only)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          arch -x86_64 brew install openssl@3
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@3)/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> $GITHUB_ENV

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
          cache: "pnpm"

      - name: Pnpm install and prebuild
        shell: bash
        run: |
          pnpm i
          # Retry prebuild up to 3 times with 30s delay (CI network transience)
          for attempt in 1 2 3; do
            pnpm run prebuild ${{ matrix.target }} && break
            if [ $attempt -lt 3 ]; then
              echo "Prebuild attempt $attempt failed, retrying in 30s..."
              sleep 30
            else
              echo "Prebuild failed after 3 attempts"
              exit 1
            fi
          done

      - name: Tauri build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: pnpm
          tagName: Prerelease-alpha
          releaseName: "Prerelease-alpha"
          releaseDraft: false
          prerelease: true
          args: --target ${{ matrix.target }} -b ${{ matrix.bundle }} --config '{"bundle":{"macOS":{"signingIdentity":null}},"plugins":{"updater":{"endpoints":["https://github.com/onesyue/clash-verge-rev/releases/download/Prerelease-alpha/latest.json"]}}}'
