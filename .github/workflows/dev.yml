name: Dev Test Build

on:
  workflow_dispatch:
    inputs:
      run_windows:
        description: "Build Windows"
        required: false
        type: boolean
        default: true
      run_macos_aarch64:
        description: "Build macOS aarch64"
        required: false
        type: boolean
        default: true
      run_windows_arm64:
        description: "Build Windows ARM64"
        required: false
        type: boolean
        default: false
      run_linux_amd64:
        description: "Build Linux amd64"
        required: false
        type: boolean
        default: false

permissions: write-all
env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  HUSKY: 0

jobs:
  dev:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis
            id: windows
            input: run_windows
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
            id: macos-aarch64
            input: run_macos_aarch64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            bundle: nsis
            id: windows-arm64
            input: run_windows_arm64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: deb
            id: linux-amd64
            input: run_linux_amd64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Skip if not selected
        if: github.event.inputs[matrix.input] != 'true'
        run: echo "Skipped ${{ matrix.id }}"

      - name: Checkout Repository
        if: github.event.inputs[matrix.input] == 'true'
        uses: actions/checkout@v6

      - name: Install Rust Stable
        if: github.event.inputs[matrix.input] == 'true'
        uses: dtolnay/rust-toolchain@1.91.0

      - name: Add Rust Target
        if: github.event.inputs[matrix.input] == 'true'
        run: rustup target add ${{ matrix.target }} --toolchain 1.91.0 || rustup target add ${{ matrix.target }}

      - name: Rust Cache
        if: github.event.inputs[matrix.input] == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          key: "rust-dev-${{ matrix.os }}-${{ matrix.target }}"
          workspaces: . -> target
          cache-all-crates: true

      - name: Install dependencies (ubuntu only)
        if: matrix.os == 'ubuntu-22.04' && github.event.inputs[matrix.input] == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxslt1.1 libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        if: github.event.inputs[matrix.input] == 'true'
        with:
          run_install: false

      - name: Install Node
        if: github.event.inputs[matrix.input] == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
          cache: "pnpm"

      - name: Pnpm install and prebuild
        if: github.event.inputs[matrix.input] == 'true'
        run: |
          pnpm i
          pnpm run prebuild ${{ matrix.target }}

      - name: Tauri build
        if: github.event.inputs[matrix.input] == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm
          args: --target ${{ matrix.target }} -b ${{ matrix.bundle }} --config '{"bundle":{"createUpdaterArtifacts":false,"macOS":{"signingIdentity":null}}}'

      - name: Upload Artifacts
        if: github.event.inputs[matrix.input] == 'true'
        uses: actions/upload-artifact@v7
        with:
          archive: false
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/deb/*.deb
          if-no-files-found: ignore
