name: Auto Tag Stable Release

on:
  push:
    branches:
      - dev
    paths-ignore:
      - "**.md"
      - ".github/workflows/**"

permissions: write-all

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check version and create tag if stable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r .version package.json)

          # Skip pre-release versions (alpha, beta, rc) — handled by alpha-fork.yml
          if echo "$VERSION" | grep -qiE '-(alpha|beta|rc|pre)'; then
            echo "Pre-release version ${VERSION}, skipping tag. Alpha workflow will handle it."
            exit 0
          fi

          TAG="v${VERSION}"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping."
            exit 0
          fi

          echo "Creating stable tag ${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"
          echo "Tag ${TAG} pushed — release-fork.yml will handle the build."
