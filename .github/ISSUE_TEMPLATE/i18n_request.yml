name: I18N Issue
title: "[I18N] "
description: Report translation errors, missing translations, or request a new language
labels: ["I18n"]
type: "Task"

body:
  - type: markdown
    attributes:
      value: |
        ## I18N Issues & Suggestions
        Use this template for translation errors, missing translations, improvement suggestions, or new language requests.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe your I18N issue or suggestion in detail
    validations:
      required: true

  - type: input
    id: language
    attributes:
      label: Language
      description: "e.g. zh, en, ja, ru, ko, ..."
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggestion or Correction
      description: If this is a translation correction or suggestion, provide the suggested content
    validations:
      required: false

  - type: checkboxes
    id: i18n-type
    attributes:
      label: Issue Type
      description: Select the applicable type(s)
      options:
        - label: Translation error
        - label: Missing translation
        - label: Improvement suggestion
        - label: New language request
    validations:
      required: true

  - type: input
    id: verge-version
    attributes:
      label: App Version
      description: Provide the YueTong version you are using
    validations:
      required: true
