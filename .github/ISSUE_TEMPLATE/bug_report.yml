name: Bug Report
title: "[BUG] "
description: Report a bug or unexpected behavior
labels: ["bug"]
type: "Bug"

body:
  - type: markdown
    attributes:
      value: |
        ## Before submitting, please confirm:

        1. You have checked the [YueTong Wiki](https://github.com/onesyue/clash-verge-rev/wiki) and FAQ
        2. No similar issue exists in the [issue tracker](https://github.com/onesyue/clash-verge-rev/issues?q=is%3Aissue) — if it does, comment on the existing issue instead
        3. You have written a concise, searchable title
        4. You have tested the [latest Alpha release](https://github.com/onesyue/clash-verge-rev/releases/tag/Prerelease-alpha) to confirm the bug still exists
        5. You have filled in all required fields below — incomplete reports may be closed

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Describe the issue clearly. Include screenshots if applicable.
    validations:
      required: true
  - type: textarea
    attributes:
      label: App Version
      description: Provide the exact YueTong version number
      render: text
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: List the steps to reproduce the behavior
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: Operating System
      options:
        - label: Windows
        - label: Linux
        - label: macOS
    validations:
      required: true
  - type: input
    attributes:
      label: OS Version
      description: Provide your OS version. For Linux, also include the desktop environment and window system.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Logs
      description: Paste the relevant debug log output
      placeholder: |
        Log files are located in the "logs/" subdirectory of the YueTong installation directory.
      render: log
    validations:
      required: true
