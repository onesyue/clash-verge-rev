name: Feature Request
title: "[Feature] "
description: Propose a new feature or enhancement
labels: ["enhancement"]
type: "Feature"

body:
  - type: markdown
    attributes:
      value: |
        ## Before submitting, please confirm:

        1. You have checked the [YueTong Wiki](https://github.com/onesyue/clash-verge-rev/wiki) to confirm the feature does not already exist
        2. No similar request exists in the [issue tracker](https://github.com/onesyue/clash-verge-rev/issues?q=is%3Aissue) — if it does, comment on the existing issue instead
        3. You have written a concise, searchable title
        4. You have tested the [latest Alpha release](https://github.com/onesyue/clash-verge-rev/releases/tag/Prerelease-alpha) to confirm the feature is not already implemented
        5. You have filled in all required fields below — incomplete requests may be closed

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of the feature you are requesting
    validations:
      required: true
  - type: textarea
    attributes:
      label: Use Case
      description: Describe the use case or problem this feature would solve
    validations:
      required: true
  - type: checkboxes
    id: os-labels
    attributes:
      label: Target OS
      description: Select the operating system(s) this feature applies to (at least one)
      options:
        - label: Windows
        - label: macOS
        - label: Linux
    validations:
      required: true
